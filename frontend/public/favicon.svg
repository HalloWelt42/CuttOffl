<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Warme Kartoffel mit kraeftiger Kontur und aufsteigendem Dampf.
       Hintergrund bleibt transparent, die Kartoffel ist freigestellt. -->
  <defs>
    <linearGradient id="pwBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#d9a36a"/>
      <stop offset="55%" stop-color="#a7683a"/>
      <stop offset="100%" stop-color="#6e3f1e"/>
    </linearGradient>
    <radialGradient id="pwHL" cx="0.38" cy="0.32" r="0.55">
      <stop offset="0%"  stop-color="#ffe7c2" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffe7c2" stop-opacity="0"/>
    </radialGradient>
    <filter id="pwSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <linearGradient id="steam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f3f6fa" stop-opacity="0"/>
      <stop offset="30%" stop-color="#f3f6fa" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f3f6fa" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Dampf: drei wellige Schwaden, werden nach oben schmaler und
       transparenter. stroke-linecap=round fuer weiche Enden. -->
  <g fill="none" stroke="url(#steam)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 48 32
             C 44 26, 52 22, 48 16
             C 44 10, 52 8, 50 2"
          stroke-width="4"/>
    <path d="M 64 34
             C 68 28, 60 24, 66 18
             C 70 12, 62 10, 66 2"
          stroke-width="4.5"/>
    <path d="M 82 32
             C 78 26, 86 22, 82 16
             C 78 10, 86 8, 84 2"
          stroke-width="4"/>
  </g>

  <!-- Kartoffel leicht verkleinert und nach unten verschoben,
       damit oben Platz fuer den Dampf bleibt. -->
  <g transform="translate(2 22) scale(0.88)">
    <!-- Kraeftige Outline + Fuellung, paint-order sorgt fuer gleichmaessige Linie -->
    <path d="M 28 56
             C 20 34, 46 14, 68 18
             C 92 22, 108 40, 108 60
             C 108 86, 92 110, 66 112
             C 38 114, 20 90, 22 72
             C 22 68, 24 62, 28 56 Z"
          fill="url(#pwBody)"
          stroke="#2b1708"
          stroke-width="5.5"
          stroke-linejoin="round"
          paint-order="stroke fill"/>

    <!-- Glanzlicht innen -->
    <path d="M 28 56
             C 20 34, 46 14, 68 18
             C 92 22, 108 40, 108 60
             C 108 86, 92 110, 66 112
             C 38 114, 20 90, 22 72
             C 22 68, 24 62, 28 56 Z"
          fill="url(#pwHL)"/>

    <!-- Augen -->
    <g filter="url(#pwSoft)">
      <ellipse cx="52" cy="46" rx="3.6" ry="2.3" fill="#3b1e0b" opacity="0.8"/>
      <ellipse cx="80" cy="58" rx="3.0" ry="1.9" fill="#3b1e0b" opacity="0.75"/>
      <ellipse cx="62" cy="82" rx="3.6" ry="2.2" fill="#3b1e0b" opacity="0.8"/>
      <ellipse cx="42" cy="76" rx="2.6" ry="1.7" fill="#3b1e0b" opacity="0.65"/>
      <ellipse cx="92" cy="84" rx="2.9" ry="1.8" fill="#3b1e0b" opacity="0.7"/>
    </g>
  </g>
</svg>
