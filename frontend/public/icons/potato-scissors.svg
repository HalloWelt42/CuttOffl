<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Kartoffel + kleine Schere oben rechts -->
  <defs>
    <linearGradient id="ps" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#e0b880"/>
      <stop offset="55%" stop-color="#b07b44"/>
      <stop offset="100%" stop-color="#7a4a22"/>
    </linearGradient>
    <radialGradient id="psHL" cx="0.4" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#ffe7c2" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#ffe7c2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="psBlade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#d9dee6"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
  </defs>

  <!-- Kartoffel (etwas zur Seite geneigt, um Platz fuer Schere zu lassen) -->
  <g transform="translate(-4 6) rotate(-8 60 66)">
    <path d="M 30 60
             C 22 38, 48 16, 68 20
             C 92 24, 106 44, 104 62
             C 100 88, 86 108, 62 108
             C 34 108, 18 86, 22 72
             C 22 68, 26 64, 30 60 Z"
          fill="url(#ps)"/>
    <path d="M 30 60
             C 22 38, 48 16, 68 20
             C 92 24, 106 44, 104 62
             C 100 88, 86 108, 62 108
             C 34 108, 18 86, 22 72
             C 22 68, 26 64, 30 60 Z"
          fill="url(#psHL)"/>

    <!-- Augen -->
    <g fill="#3b1e0b">
      <ellipse cx="52" cy="46" rx="3" ry="1.9" opacity="0.7"/>
      <ellipse cx="78" cy="56" rx="2.8" ry="1.7" opacity="0.65"/>
      <ellipse cx="60" cy="82" rx="3" ry="1.9" opacity="0.7"/>
      <ellipse cx="42" cy="72" rx="2.4" ry="1.5" opacity="0.55"/>
    </g>
  </g>

  <!-- Schere oben rechts, offen, in Akzent-Blau getoent -->
  <g transform="translate(72 8) rotate(20)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Klingen -->
    <path d="M 4 4 L 34 28" stroke="url(#psBlade)" stroke-width="4" fill="none"/>
    <path d="M 4 28 L 34 4" stroke="url(#psBlade)" stroke-width="4" fill="none"/>
    <!-- Griffe (Akzent) -->
    <circle cx="3"  cy="6"  r="5" fill="none" stroke="#58a6ff" stroke-width="3"/>
    <circle cx="3"  cy="26" r="5" fill="none" stroke="#58a6ff" stroke-width="3"/>
    <!-- Mittelschraube -->
    <circle cx="20" cy="16" r="1.8" fill="#0b0f14"/>
  </g>
</svg>
