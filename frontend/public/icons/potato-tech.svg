<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Kartoffel in Brand-Farben mit sauberem Diagonal-Cut -->
  <defs>
    <linearGradient id="pt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#79c0ff"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="ptHL" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ptClip">
      <path d="M 28 56
               C 20 34, 46 14, 68 18
               C 92 22, 108 40, 108 60
               C 108 86, 92 110, 66 112
               C 38 114, 20 90, 22 72
               C 22 68, 24 62, 28 56 Z"/>
    </clipPath>
  </defs>

  <path d="M 28 56
           C 20 34, 46 14, 68 18
           C 92 22, 108 40, 108 60
           C 108 86, 92 110, 66 112
           C 38 114, 20 90, 22 72
           C 22 68, 24 62, 28 56 Z"
        fill="url(#pt)"/>
  <path d="M 28 56
           C 20 34, 46 14, 68 18
           C 92 22, 108 40, 108 60
           C 108 86, 92 110, 66 112
           C 38 114, 20 90, 22 72
           C 22 68, 24 62, 28 56 Z"
        fill="url(#ptHL)"/>

  <!-- Diagonaler Schnitt, der die Kartoffel virtuell zerteilt -->
  <g clip-path="url(#ptClip)">
    <line x1="12" y1="98" x2="118" y2="22"
          stroke="#0b0f14" stroke-width="3" opacity="0.35"/>
    <line x1="12" y1="96" x2="118" y2="20"
          stroke="#ffffff" stroke-width="1.4" opacity="0.85"/>
  </g>

  <!-- Augen als kleine helle Dots -->
  <g fill="#ffffff" opacity="0.55">
    <circle cx="50" cy="44" r="1.8"/>
    <circle cx="82" cy="60" r="1.6"/>
    <circle cx="62" cy="86" r="1.8"/>
    <circle cx="92" cy="86" r="1.4"/>
    <circle cx="38" cy="74" r="1.4"/>
  </g>
</svg>
