<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Warme Erd-Kartoffel mit leichtem Schnitt -->
  <defs>
    <linearGradient id="pw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#d9a36a"/>
      <stop offset="55%" stop-color="#a7683a"/>
      <stop offset="100%" stop-color="#6e3f1e"/>
    </linearGradient>
    <radialGradient id="pwHL" cx="0.38" cy="0.32" r="0.55">
      <stop offset="0%" stop-color="#ffe7c2" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffe7c2" stop-opacity="0"/>
    </radialGradient>
    <filter id="pwShade" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Kartoffel-Form: unregelmaessiges Oval -->
  <path d="M 28 56
           C 20 34, 46 14, 68 18
           C 92 22, 108 40, 108 60
           C 108 86, 92 110, 66 112
           C 38 114, 20 90, 22 72
           C 22 68, 24 62, 28 56 Z"
        fill="url(#pw)"/>

  <!-- Highlight oben links -->
  <path d="M 28 56
           C 20 34, 46 14, 68 18
           C 92 22, 108 40, 108 60
           C 108 86, 92 110, 66 112
           C 38 114, 20 90, 22 72
           C 22 68, 24 62, 28 56 Z"
        fill="url(#pwHL)"/>

  <!-- Augen (Dellen) -->
  <g filter="url(#pwShade)">
    <ellipse cx="52" cy="46" rx="3.5" ry="2.2" fill="#3b1e0b" opacity="0.75"/>
    <ellipse cx="80" cy="58" rx="3"   ry="1.8" fill="#3b1e0b" opacity="0.7"/>
    <ellipse cx="62" cy="82" rx="3.5" ry="2.1" fill="#3b1e0b" opacity="0.75"/>
    <ellipse cx="42" cy="76" rx="2.5" ry="1.6" fill="#3b1e0b" opacity="0.6"/>
    <ellipse cx="92" cy="84" rx="2.8" ry="1.7" fill="#3b1e0b" opacity="0.65"/>
  </g>

  <!-- Schnitt-Kerbe rechts oben -->
  <path d="M 96 34 L 106 28 L 104 38 L 94 44 Z" fill="#3b1e0b" opacity="0.55"/>
  <path d="M 96 34 L 106 28" stroke="#ffe7c2" stroke-width="1.2" opacity="0.6" stroke-linecap="round"/>
</svg>
